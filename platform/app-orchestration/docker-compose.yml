services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gtelpay
      POSTGRES_USER: gtelpay
      POSTGRES_PASSWORD: gtelpay
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
