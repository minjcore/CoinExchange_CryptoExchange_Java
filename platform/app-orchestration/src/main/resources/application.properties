spring.application.name=app-orchestration

orchestration.http.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/gtelpay
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=gtelpay
spring.datasource.password=gtelpay

spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=OrchPool
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=never

# RabbitMQ auto-config excluded globally; PayoutAmqpConfig creates ConnectionFactory when payout.amqp.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

payout.amqp.enabled=false
payout.bank.stub.mode=always-success

deposit.amqp.enabled=false
accounting.amqp.enabled=false
wallet.amqp.enabled=false
